<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página especial ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg,#1e3c72,#2a5298);
    color:white;
    text-align:center;
}

/* SECCIONES */
.section{
    display:none;
    min-height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    padding:20px;
}

.active{display:flex;}

h1{font-size:2rem;}
.edad{
    font-size:5rem;
    color:gold;
}

/* BOTÓN */
button{
    margin-top:20px;
    padding:15px 25px;
    border:none;
    border-radius:40px;
    background:#ff4d6d;
    color:white;
    font-size:1rem;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- INICIO -->
<div class="section active" id="s1">
<h1>Hey 😏</h1>
<p>Esto es para tus</p>
<div class="edad">19</div>

<button onclick="next(2)">Entrar</button>
</div>

<!-- HISTORIA -->
<div class="section" id="s2">
<h1>Te acuerdas de nosotros?</h1>
<p>Todo empezó con algo simple...</p>

<button onclick="next(3)">Seguir</button>
</div>

<!-- INTERACCIÓN -->
<div class="section" id="s3">
<h1>Haz esto 👇</h1>
<p>Toca el botón 5 veces</p>

<button onclick="contar()">❤️</button>
<p id="contador">0</p>

<button id="btnNext" style="display:none;" onclick="next(4)">Continuar</button>
</div>

<!-- CUMPLE -->
<div class="section" id="s4">
<h1>🎂 Feliz Cumpleaños</h1>
<p>Toca 3 veces para pedir tu deseo</p>

<button onclick="soplar()">🎂</button>
<p id="soplos">0/3</p>

<button id="btnFinal" style="display:none;" onclick="next(5)">Final</button>
</div>

<!-- FINAL -->
<div class="section" id="s5">
<h1>💖</h1>
<p>
Eres muy importante para mí.<br><br>
Feliz cumpleaños 😏
</p>

<button onclick="location.reload()">Reiniciar</button>
</div>

<script>
let count = 0;
let soplos = 0;

/* CAMBIAR SECCIÓN */
function next(n){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById('s'+n).classList.add('active');
}

/* CONTADOR */
function contar(){
count++;
document.getElementById('contador').innerText = count;

if(count >= 5){
document.getElementById('btnNext').style.display = 'block';
}
}

/* SOPLAR */
function soplar(){
soplos++;
document.getElementById('soplos').innerText = soplos + "/3";

if(soplos >= 3){
document.getElementById('btnFinal').style.display = 'block';
}
}
</script>

</body>
</html>
