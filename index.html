<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parque de Diversiones 🎡</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Segoe UI',sans-serif;
    background: radial-gradient(circle at top,#1a2a6c,#16222a);
    color:white;
    overflow:hidden;
}
.section{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}
.active{display:flex;animation:fade .6s ease;}
@keyframes fade{from{opacity:0}to{opacity:1}}

h1{margin-bottom:10px;}

.btn{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff416c,#ff4b2b);
    color:white;
    cursor:pointer;
}

.emoji{
    position:absolute;
    font-size:24px;
    animation:float 3s linear forwards;
}
@keyframes float{
    to{transform:translateY(-120vh) rotate(720deg);opacity:0}
}

/* JUEGO MEMORIA */
.grid{
    display:grid;
    grid-template-columns:repeat(4,60px);
    gap:10px;
}
.card{
    width:60px;height:60px;
    background:#fff2;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    cursor:pointer;
}

/* BARRA PROGRESO */
.bar{
    width:200px;height:10px;
    background:#fff3;
    margin-top:15px;
}
.fill{
    height:100%;
    width:0%;
    background:#00ffcc;
}
</style>
</head>
<body>

<!-- INTRO -->
<div class="section active" id="s1">
<h1>🎡 Bienvenida al parque</h1>
<p>Hoy no es un día normal...</p>
<button class="btn" onclick="go(2)">Entrar</button>
</div>

<!-- NIVEL 1 CLICK RAPIDO -->
<div class="section" id="s2">
<h1>Nivel 1 ⚡</h1>
<p>Toca 10 veces rápido</p>
<button class="btn" onclick="fastClick()">🔥</button>
<p id="fast">0</p>
</div>

<!-- NIVEL 2 REFLEJOS -->
<div class="section" id="s3">
<h1>Nivel 2 🎯</h1>
<p>Toca el botón cuando aparezca</p>
<button id="target" class="btn" style="display:none" onclick="hit()">¡YA!</button>
<p id="msg"></p>
</div>

<!-- NIVEL 3 MEMORIA -->
<div class="section" id="s4">
<h1>Nivel 3 🧠</h1>
<p>Encuentra las parejas</p>
<div class="grid" id="grid"></div>
<p id="pairs">0/4</p>
</div>

<!-- NIVEL 4 SUERTE -->
<div class="section" id="s5">
<h1>Nivel 4 🎰</h1>
<p>Prueba tu suerte</p>
<button class="btn" onclick="luck()">Girar</button>
<p id="luck"></p>
</div>

<!-- FINAL -->
<div class="section" id="s6">
<h1>💖 Nivel final</h1>
<p>Ganaste el juego...
<br><br>
pero yo gané algo mejor 😏
<br><br>
Tú.
<br><br>
Feliz cumpleaños 🎂</p>
<button class="btn" onclick="location.reload()">Repetir</button>
</div>

<script>
let fc=0;
function go(n){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById('s'+n).classList.add('active');
}

function fastClick(){
 fc++;
 document.getElementById('fast').innerText=fc;
 spawn('🔥');
 if(fc>=10){setTimeout(()=>go(3),500)}
}

/* REFLEJOS */
setTimeout(()=>{
 document.getElementById('target').style.display='block';
},2000);
function hit(){
 document.getElementById('msg').innerText='Buen reflejo 😏';
 spawn('🎯');
 setTimeout(()=>go(4),1000);
}

/* MEMORIA */
let emojis=['😏','😏','🔥','🔥','💖','💖','😂','😂'];
emojis.sort(()=>Math.random()-0.5);
let first=null;
let pairs=0;

emojis.forEach((e,i)=>{
 let c=document.createElement('div');
 c.className='card';
 c.dataset.val=e;
 c.onclick=()=>flip(c);
 document.getElementById('grid').appendChild(c);
});

function flip(c){
 if(c.innerText) return;
 c.innerText=c.dataset.val;

 if(!first){first=c;return;}

 if(first.dataset.val===c.dataset.val){
 pairs++;
 document.getElementById('pairs').innerText=pairs+'/4';
 spawn('✨');
 first=null;
 if(pairs>=4){setTimeout(()=>go(5),1000)}
 }else{
 setTimeout(()=>{
 first.innerText='';
 c.innerText='';
 first=null;
 },600);
 }
}

/* SUERTE */
function luck(){
 let r=Math.random();
 if(r>0.7){
 document.getElementById('luck').innerText='GANASTE 🎉';
 spawn('🎉');
 setTimeout(()=>go(6),1000);
 }else{
 document.getElementById('luck').innerText='Otra vez 😂';
 }
}

function spawn(e){
 let el=document.createElement('div');
 el.className='emoji';
 el.innerText=e;
 el.style.left=Math.random()*100+'%';
 document.body.appendChild(el);
 setTimeout(()=>el.remove(),3000);
}
</script>

</body>
</html>
