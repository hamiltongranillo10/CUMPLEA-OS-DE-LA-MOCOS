<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parque de Diversiones 🌊🎡</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Segoe UI',sans-serif;
    color:white;
    overflow:hidden;
    text-align:center;
}

/* 🌊 FONDO MAR */
body::before{
    content:"";
    position:fixed;
    width:200%;height:200%;
    background: linear-gradient(180deg,#1e3c72,#2a5298,#87CEEB);
    animation:wave 12s linear infinite;
    z-index:-1;
}
@keyframes wave{from{transform:translateX(0);}to{transform:translateX(-50%);}}

.section{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px;}
.active{display:flex;}

.btn{margin-top:15px;padding:12px 25px;border:none;border-radius:30px;background:#ff4d6d;color:white;cursor:pointer;}

/* PUZZLE */
#puzzle{
    display:grid;
    grid-template-columns:repeat(3,90px);
    gap:5px;
}
.piece{
    width:90px;height:90px;
    background-image:url(FOTO_DE_ELLA.jpg);
    background-size:270px 270px;
    cursor:pointer;
}

/* EMOJIS */
.emoji{position:absolute;font-size:24px;animation:float 3s linear forwards;}
@keyframes float{to{transform:translateY(-120vh);opacity:0}}

</style>
</head>
<body>

<!-- 🎵 MUSICA -->
<audio id="music" loop>
<source src="MUSICA.mp3" type="audio/mp3">
</audio>

<!-- INTRO -->
<div class="section active" id="s1">
<h1>🌊 Bienvenida</h1>
<p>Esto es un juego real 😏</p>
<button class="btn" onclick="startGame()">Empezar</button>
</div>

<!-- PUZZLE -->
<div class="section" id="s2">
<h1>🧩 Rompecabezas</h1>
<p>Ordena la imagen</p>
<div id="puzzle"></div>
<p id="done"></p>
</div>

<!-- FINAL -->
<div class="section" id="s3">
<h1>💖</h1>
<p>Lo lograste...
<br><br>Feliz cumpleaños 🎂</p>
<button class="btn" onclick="location.reload()">Repetir</button>
</div>

<script>
function startGame(){
 document.getElementById('music').play();
 go(2);
}

function go(n){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById('s'+n).classList.add('active');
}

/* PUZZLE CORREGIDO */
let positions=[0,1,2,3,4,5,6,7,8];
let shuffled=[...positions].sort(()=>Math.random()-0.5);
let selected=null;

shuffled.forEach((pos,index)=>{
 let div=document.createElement('div');
 div.className='piece';
 div.dataset.correct=pos;
 div.dataset.current=index;

 let x=pos%3;
 let y=Math.floor(pos/3);
 div.style.backgroundPosition=`${x*-90}px ${y*-90}px`;

 div.onclick=()=>selectPiece(div);
 document.getElementById('puzzle').appendChild(div);
});

function selectPiece(el){
 if(!selected){
 selected=el;
 el.style.outline='3px solid yellow';
 return;
 }

 // intercambiar
 let tempBg=selected.style.backgroundPosition;
 selected.style.backgroundPosition=el.style.backgroundPosition;
 el.style.backgroundPosition=tempBg;

 selected.style.outline='none';
 selected=null;
 checkPuzzle();
}

function checkPuzzle(){
 let correct=0;
 document.querySelectorAll('.piece').forEach((p,i)=>{
 let x=i%3;
 let y=Math.floor(i/3);
 let expected=`${x*-90}px ${y*-90}px`;
 if(p.style.backgroundPosition===expected){correct++;}
 });

 if(correct===9){
 document.getElementById('done').innerText='Perfecto 😏';
 spawn('🎉');
 setTimeout(()=>go(3),1200);
 }
}

function spawn(e){
 let el=document.createElement('div');
 el.className='emoji';
 el.innerText=e;
 el.style.left=Math.random()*100+'%';
 document.body.appendChild(el);
 setTimeout(()=>el.remove(),3000);
}
</script>

</body>
</html>
