<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Universo de Motivación</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Quicksand',sans-serif;}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}

/* VIDEO */
#video-bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.25;
}

/* MODAL */
#modal{
  position:fixed;inset:0;z-index:9999;
  display:flex;justify-content:center;align-items:center;
  background:#F9B8D4;
  transition:opacity 1s ease;
}
#modal.oculto{opacity:0;pointer-events:none;}

.card{
  background:#fff;
  border-radius:28px;
  padding:26px;
  width:min(340px, 88vw);
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 6px 32px rgba(220,80,130,0.13);
}

.card-img-wrap{
  width:100%;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:20px;
}

.card-img-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-quote{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:1.3rem;
  text-align:center;
  margin-bottom:10px;
}

.card-sub{
  font-size:0.65rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#c86a8a;
  margin-bottom:20px;
}

#btn-entrar{
  width:100%;
  padding:1rem;
  border-radius:50px;
  border:1.5px solid #E0306A;
  background:#fff;
  color:#E0306A;
  cursor:pointer;
  letter-spacing:3px;
}

.top-text{
  position:fixed;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  display:none;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video id="video-bg" autoplay muted loop playsinline>
  <source src="VIDEO_FIDEOS_IDIOMA_RARO.mp4" type="video/mp4">
</video>

<!-- MODAL -->
<div id="modal">
  <div class="card">
    <div class="card-img-wrap">
      <img src="https://i.postimg.cc/mgpQLsR9/desktop-wallpaper-cats-tumblr-galaxy-galaxy-cat.jpg">
    </div>

    <div class="card-quote">
      Eres una persona increíble, nunca olvides el valor que tienes ✨
    </div>

    <div class="card-sub">Un mensaje para ti</div>

    <button id="btn-entrar">
      ✨ Entra y descubre tu poder ✨
    </button>
  </div>
</div>

<div class="top-text" id="top-text"></div>
<canvas id="galaxy"></canvas>

<script>
document.getElementById('btn-entrar').addEventListener('click',()=>{
  document.getElementById('modal').style.display='none';
  document.getElementById('top-text').style.display='block';
});
</script>

<!-- THREE JS -->
<script type="importmap">
{
"imports":{
"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
"three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('galaxy'), alpha:true});

renderer.setSize(innerWidth, innerHeight);
camera.position.z = 5;

/* FRASES MOTIVACIONALES */
const phrases=[
  "Eres más fuerte de lo que crees",
  "Todo lo que sueñas es posible",
  "Confía en tu proceso",
  "Nunca dudes de tu valor",
  "Eres capaz de lograrlo",
  "Tu potencial es infinito",
  "Hoy es un buen día para empezar",
  "La constancia vence al talento",
  "Sigue avanzando",
  "Tu mentalidad lo es todo"
];

function createTextSprite(text){
  const canvas=document.createElement('canvas');
  canvas.width=1024; canvas.height=256;
  const ctx=canvas.getContext('2d');

  ctx.fillStyle="#ffffff";
  ctx.font="50px Quicksand";
  ctx.textAlign="center";
  ctx.fillText(text,512,128);

  const texture=new THREE.CanvasTexture(canvas);
  const material=new THREE.SpriteMaterial({map:texture, transparent:true});
  const sprite=new THREE.Sprite(material);

  return sprite;
}

/* GENERAR FRASES EN ESPACIO */
const group=new THREE.Group();
scene.add(group);

phrases.forEach((txt,i)=>{
  const sp=createTextSprite(txt);
  sp.position.set(
    (Math.random()-0.5)*10,
    (Math.random()-0.5)*6,
    (Math.random()-0.5)*10
  );
  sp.scale.set(4,1,1);
  group.add(sp);
});

function animate(){
  requestAnimationFrame(animate);
  group.rotation.y += 0.002;
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
